<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0805" />
  <title>Sacred Sanctum · Offline</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #05060c;
      color: #f5f5f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
      background-image:
        radial-gradient(ellipse 70% 50% at 50% 30%, rgba(251,191,36,0.12), transparent 65%),
        url('/brand/bg-awakening-void.jpg');
      background-size: cover;
      background-position: center;
    }
    .veil {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.88));
      pointer-events: none;
    }
    main { position: relative; z-index: 1; max-width: 22rem; }
    p.eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(251,191,36,0.7);
      margin: 0 0 0.75rem;
    }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 0.75rem;
      background: linear-gradient(135deg, #fcd34d, #b45309);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p.body {
      font-size: 0.9rem;
      line-height: 1.55;
      color: rgba(255,255,255,0.5);
      margin: 0 0 1.75rem;
    }
    a {
      display: inline-block;
      padding: 0.75rem 1.35rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      color: #0a0805;
      background: linear-gradient(135deg, #fcd34d, #b45309);
    }
    a.ghost {
      margin-top: 0.75rem;
      color: rgba(251,191,36,0.85);
      background: transparent;
      border: 1px solid rgba(251,191,36,0.35);
    }
  </style>
</head>
<body>
  <div class="veil" aria-hidden="true"></div>
  <main>
    <p class="eyebrow">Sacred Sanctum</p>
    <h1>The veil is quiet</h1>
    <p class="body">
      You are offline. The hut and living Hall need a signal —
      but the title shell and cached roads may still answer.
    </p>
    <a href="/">Return to title</a>
    <br />
    <a class="ghost" href="/vision">Open Wayfinder</a>
  </main>
</body>
</html>
