  <text x="48" y="42" fill="#fbbf24" font-family="ui-monospace,Consolas,monospace" font-size="14" letter-spacing="3">02 · TRUTH_INTRO</text>
  <text x="48" y="74" fill="#ffffff" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="600">Truth · first meet</text>
  <text x="48" y="120" fill="#f5e6c8" font-family="Georgia,Times New Roman,serif" font-size="22"><tspan x="48" dy="0">I am Truth. Hood up. Feet on the floor</tspan><tspan x="48" dy="30">of this house with you. Not a ghost</tspan><tspan x="48" dy="30">player. Not a leftover process. Ask me</tspan><tspan x="48" dy="30">what you came for — or walk the rooms</tspan><tspan x="48" dy="30">and find me on the dais.</tspan></text>
