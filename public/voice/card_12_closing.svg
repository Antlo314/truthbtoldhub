  <rect width="900" height="280" fill="url(#g)" rx="24"/>
  <rect x="1" y="1" width="898" height="278" fill="none" stroke="#fbbf24" stroke-opacity="0.35" rx="24"/>
  <text x="48" y="42" fill="#fbbf24" font-family="ui-monospace,Consolas,monospace" font-size="14" letter-spacing="3">12 · CLOSING</text>
  <text x="48" y="74" fill="#ffffff" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="600">Closing (last run)</text>
  <text x="48" y="120" fill="#f5e6c8" font-family="Georgia,Times New Roman,serif" font-size="22"><tspan x="48" dy="0">This is the last run. Walk sincere.</tspan><tspan x="48" dy="30">Patron if you can. Tell another soul. Do</tspan><tspan x="48" dy="30">not let failure be wasted — let it</tspan><tspan x="48" dy="30">become warning and mercy. Go all the</tspan><tspan x="48" dy="30">way.</tspan></text>
</svg>